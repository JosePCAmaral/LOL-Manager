services:
  mysql:
    image: mysql:8.4
    container_name: lol-manager-mysql
    env_file:
      - ./backend/.env
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lol_manager
      MYSQL_USER: lolmanager
      MYSQL_PASSWORD: lolmanager
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lol-manager-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: lolmanager
      DB_PASSWORD: lolmanager
      DB_NAME: lol_manager
    ports:
      - "3002:3002"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    command: npx ts-node src/main.ts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lol-manager-frontend
    ports:
      - "40202:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm start -- --host 0.0.0.0 --port 4200

volumes:
  mysql_data:
  backend_node_modules:
  frontend_node_modules: